<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JP2 Memory Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Ekran startowy -->
  <div id="name-screen">
    <div class="name-screen-content">
      <h1>JP2 Memory Card</h1>
      <p>Gra na poprawę pamięci</p>
      <input type="text" id="player-name" placeholder="Wpisz swoje imię..." maxlength="20" autofocus>
      <button onclick="startGame()">Zagraj!</button>
    </div>
  </div>

  <audio id="bg-music" src="audio/Jan Paweł II - Barka.mp3" loop></audio>

  <header>
    <h1>JP2 Memory Card - gra na poprawę pamięci.</h1>
    <nav>
      <button onclick="initGame()">Nowa gra</button>
      <button onclick="showScores()">Najlepsze wyniki</button>
      <button id="mute-btn" onclick="toggleMute()" title="Wycisz cudowną pieśń">🔊</button>
    </nav>
    <div id="timer">00:00</div>
  </header>

  <main>
    <div id="card-grid"></div>
  </main>

  <!-- Modal wygranej z rankingiem -->
  <div id="win-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Brawo, <span id="win-player"></span>!</h2>
      <p>Twój czas: <strong id="win-time"></strong> &nbsp;·&nbsp; <span id="win-rank"></span></p>
      <ol id="win-ranking" class="ranking-list"></ol>
      <div class="modal-buttons">
        <button onclick="restartGame()">Zagraj ponownie</button>
        <button onclick="changePlayer()">Zmień gracza</button>
        <button onclick="showScores(); closeModal('win-modal')">Pełny ranking</button>
      </div>
    </div>
  </div>

  <!-- Modal rankingu -->
  <div id="scores-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Najlepsze wyniki</h2>
      <ol id="scores-ranking" class="ranking-list"></ol>
      <div class="modal-buttons">
        <button onclick="closeModal('scores-modal')">Zamknij</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="game.js"></script>
</body>
</html>
